<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAPPY BIRTHDAY&lt;333</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩷</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fdf6ec;
      color: #3a2e2a;
      min-height: 100vh;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 1.5rem 2rem;
      text-align: center;
    }

    .hero-text {
      max-width: 800px;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #6b4a3e;
      margin-bottom: 1rem;
    }

    .hero .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      opacity: 0.75;
      max-width: 600px;
      margin: 0 auto;
    }

    .horse-wrapper {
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16 / 10;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      background-color: transparent;
    }

    .loading-bar {
      display: block;
      width: 60%;
      max-width: 240px;
      height: 4px;
      border-radius: 99px;
      background: rgba(107, 74, 62, 0.15);
      overflow: hidden;
    }

    .loading-bar .fill {
      display: block;
      height: 100%;
      width: 0%;
      background: #d96a8a;
      transition: width 0.3s ease;
    }

    .progress-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #6b4a3e;
      opacity: 0.8;
    }

    .progress-wrap[hidden] { display: none; }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-text">
      <h1>HAPPY BIRTHDAY BABY</h1>
      <p class="subtitle">a website made for you by your cool boyfriend 🩷</p>
    </div>

    <div class="horse-wrapper">
      <model-viewer
        src="models/horse.glb"
        alt="A galloping horse"
        autoplay
        camera-controls
        disable-zoom
        interaction-prompt="none"
        shadow-intensity="0"
        exposure="1.1"
        camera-orbit="-30deg 80deg 4m"
        loading="eager">

        <div class="progress-wrap" slot="progress-bar">
          <span class="loading-bar"><span class="fill"></span></span>
          <span>loading something special…</span>
        </div>
      </model-viewer>
    </div>
  </section>

  <script>
    const mv = document.querySelector('model-viewer');
    const wrap = document.querySelector('.progress-wrap');
    const fill = document.querySelector('.loading-bar .fill');

    mv.addEventListener('progress', (e) => {
      const pct = e.detail.totalProgress * 100;
      fill.style.width = pct + '%';
      if (e.detail.totalProgress === 1) {
        wrap.setAttribute('hidden', '');
      }
    });
  </script>
</body>
</html>
